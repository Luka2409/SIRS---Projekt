<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        
        /*izgled stranice*/
        body
        {
            font-family: 'Times New Roman', Times, serif;
            background-color: white;
            padding: 20px;
            text-align: center;
        }
        
        /*izgled gumba*/
        button
        {
            border: 4px;
            border-style: inset;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            color: white
        }
        
        /*jednak razmak u div-u*/
        div
        {
            display: flex;
            justify-content: space-evenly;
        }
        
        /*izgled gumba za pojedine valute*/
        #gumbEuro
        {
            background: blue;
        }
        #gumbMarke
        {
            background: gold;
            color: black;
        }
        #gumbDolar
        {
            background: limegreen;
        }
        #gumbFunti
        {
            background: red;
            color: black;
        }


    </style>
</head>
<body>
    <!--Tekst koji se prikazuje na početku stranice-->
    <h1>Koverzija valuta</h1>
    <h3>Odaberi valutu za konverziju:</h3>
    <div>
        <button id="gumbEuro" onclick="Euro()">EURO</button>
        <button id="gumbMarke" onclick="Marke()">BiH MARKE</button>
        <button id="gumbDolar" onclick="Dolar()">DOLAR</button>
        <button id="gumbFunti" onclick="Funti()">FUNTI</button>
    </div>
    <!--Prostor gdje će se konverzije ispisati-->
    <p id="ispis">Konverzije će se prikazati ovdje...</p>
    <script>

        const ispis=document.getElementById("ispis");

        //funkcija za dohvaćanje podataka za konverziju eura
        async function Euro()
        {
            ispis.textContent="Učitavam...";
            ispis.className="";

            try
            {
                const data=await (await fetch("http://localhost:3000/euro")).json();
                ispis.textContent="BiH marke = "+data.marka+", Dolar = "+data.dolar+", Funti = "+data.funti;
            }
            catch(error)
            {
                ispis.textContent=error;
            }
        }

        //funkcija za dohvaćanje podataka za konverziju maraka
        async function Marke()
        {
            ispis.textContent="Učitavam...";
            ispis.className="";

            try
            {
                const data=await (await fetch("http://localhost:3000/marka")).json();
                ispis.textContent="Euro = "+data.euro+", Dolar = "+data.dolar+", Funti = "+data.funti;
            }
            catch(error)
            {
                ispis.textContent=error;
            }
        }

        //funkcija za dohvaćanje podataka za konverziju dolara
        async function Dolar()
        {
            ispis.textContent="Učitavam...";
            ispis.className="";

            try
            {
                const data=await (await fetch("http://localhost:3000/dolar")).json();
                ispis.textContent="BiH marke = "+data.marka+", Euro = "+data.euro+", Funti = "+data.funti;
            }
            catch(error)
            {
                ispis.textContent=error;
            }
        }

        //funkcija za dohvaćanje podataka za konverziju funti
        async function Funti()
        {
            ispis.textContent="Učitavam...";
            ispis.className="";

            try
            {
                const data=await (await fetch("http://localhost:3000/funti")).json();
                ispis.textContent="BiH marke = "+data.marka+", Dolar = "+data.dolar+", Euro = "+data.euro;
            }
            catch(error)
            {
                ispis.textContent=error;
            }
        }

    </script>
    
</body>
</html>
